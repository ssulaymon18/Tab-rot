<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tab Rot</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #fff; padding: 15px; width: 340px; margin: 0; }
        h1 { font-size: 18px; margin-top: 0; color: #0088cc; }
        .tab-card { background: #2a2a2a; padding: 10px; margin: 8px 0; border-radius: 4px; display: flex; flex-direction: column; font-size: 11px; }
        .rotted { border: 1px solid #ff4444; background: #3a1a1a; }
        .clear-btn { background: #cc3333; color: #fff; border: none; padding: 8px 12px; cursor: pointer; border-radius: 3px; font-family: monospace; width: 100%; margin-bottom: 10px; }
        .clear-btn:hover { background: #ff4444; }
    </style>
</head>
<body>

    <h1>🗂️ Live Tab Rot</h1>
    <button class="clear-btn" id="clearBtn">🗑️ Close All Rotten Tabs</button>
    <div id="tabs-container"></div>

    <script>
        const ROT_LIMIT = 172800000; // 48 hours of inactivity for quick testing!

        async function renderRealTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';

            // Fetch active timestamps from background storage
            const data = await chrome.storage.local.get('tabActivity');
            const tabActivity = data.tabActivity || {};
            const now = Date.now();

            // Query every single real open tab in this window
            chrome.tabs.query({ currentWindow: true }, (tabs) => {
                tabs.forEach(tab => {
                    const lastActive = tabActivity[tab.id] || now;
                    const elapsed = now - lastActive;
                    const isRotted = !tab.active && (elapsed > ROT_LIMIT);

                    const div = document.createElement('div');
                    div.className = `tab-card ${isRotted ? 'rotted' : ''}`;
                    
                    const secondsInactive = Math.floor(elapsed / 1000);

                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; font-weight:bold;">
                            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:200px;">${tab.title}</span>
                            <span style="color:${isRotted ? '#ff4444' : '#00ff88'}">${isRotted ? 'ROTTED' : 'ACTIVE'}</span>
                        </div>
                        <div style="color:#888; font-size:10px; margin-top:4px;">
                            ${tab.active ? 'Currently viewing' : `Idle: ${secondsInactive}s`}
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        // Action button to actually close the rotted tabs out of Chrome completely
        document.getElementById('clearBtn').addEventListener('click', async () => {
            const data = await chrome.storage.local.get('tabActivity');
            const tabActivity = data.tabActivity || {};
            const now = Date.now();

            chrome.tabs.query({ currentWindow: true }, (tabs) => {
                tabs.forEach(tab => {
                    const lastActive = tabActivity[tab.id] || now;
                    if (!tab.active && (now - lastActive > ROT_LIMIT)) {
                        chrome.tabs.remove(tab.id); // This kills the actual tab!
                    }
                });
                setTimeout(renderRealTabs, 500);
            });
        });

        // Keep the UI ticking dynamically every second
        setInterval(renderRealTabs, 1000);
        renderRealTabs();
    </script>
</body>
</html>
